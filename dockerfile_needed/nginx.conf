server {
    listen 80;
    server_name _;

    root /home/akiba/akiba_frontend/dist;
    index index.html;

    # SPA fallback — serve index.html for client-side router paths
    location / {
        try_files $uri $uri/ /index.html;
    }

    # All backend traffic is funnelled through /api/. Both auth and business
    # routes live under this prefix on the ktor server (see AkibaServer.kt).
    location /api/ {
        # Allow binary file uploads up to 100 MB per request. If the total
        # exceeds this, upload in smaller batches.
        client_max_body_size 100M;

        proxy_pass http://localhost:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket upgrade support (used by the streaming chat endpoint, if any)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;

        # Long-running LLM/agent requests can take a while
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
